<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#f8fafc" rx="12" />

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">kafka-notify — Architecture Diagram</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">NX Monorepo · Event-Driven Microservices · KafkaJS · Angular 19 · Express</text>

  <!-- ─── ZONE BACKGROUNDS ─── -->
  <!-- Producer zone -->
  <rect x="30" y="85" width="300" height="480" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" />
  <text x="180" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">PRODUCER STACK</text>

  <!-- Kafka zone -->
  <rect x="380" y="85" width="340" height="480" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1.5" />
  <text x="550" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#ca8a04">KAFKA INFRASTRUCTURE</text>

  <!-- Consumer zone -->
  <rect x="770" y="85" width="300" height="480" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" />
  <text x="920" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">CONSUMER STACK</text>

  <!-- Shared libs zone -->
  <rect x="30" y="590" width="1040" height="110" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5" />
  <text x="550" y="610" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">SHARED LIBRARIES (NX libs)</text>

  <!-- ─── PRODUCER UI ─── -->
  <rect x="55" y="125" width="250" height="90" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <rect x="55" y="125" width="250" height="28" rx="10" fill="#3b82f6" />
  <rect x="55" y="140" width="250" height="13" fill="#3b82f6" />
  <text x="180" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Producer UI</text>
  <text x="180" y="170" text-anchor="middle" font-size="12" fill="#1e40af">Angular 19  ·  :4200</text>
  <text x="180" y="188" text-anchor="middle" font-size="11" fill="#64748b">Place / Cancel order forms</text>
  <text x="180" y="204" text-anchor="middle" font-size="11" fill="#64748b">Angular Signals · Zoneless</text>

  <!-- ─── PRODUCER API ─── -->
  <rect x="55" y="265" width="250" height="120" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <rect x="55" y="265" width="250" height="28" rx="10" fill="#2563eb" />
  <rect x="55" y="280" width="250" height="13" fill="#2563eb" />
  <text x="180" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Producer API</text>
  <text x="180" y="310" text-anchor="middle" font-size="12" fill="#1d4ed8">Express.js  ·  :3001</text>
  <text x="180" y="328" text-anchor="middle" font-size="11" fill="#64748b">POST /api/events/order-placed</text>
  <text x="180" y="344" text-anchor="middle" font-size="11" fill="#64748b">POST /api/events/order-cancelled</text>
  <text x="180" y="362" text-anchor="middle" font-size="11" fill="#64748b">KafkaEventPublisher</text>
  <text x="180" y="378" text-anchor="middle" font-size="11" fill="#64748b">Use cases: PlaceOrder · CancelOrder</text>

  <!-- ─── KAFKA BROKER ─── -->
  <rect x="405" y="125" width="290" height="175" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2" filter="url(#shadow)" />
  <rect x="405" y="125" width="290" height="28" rx="10" fill="#d97706" />
  <rect x="405" y="140" width="290" height="13" fill="#d97706" />
  <text x="550" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Kafka Broker</text>
  <text x="550" y="170" text-anchor="middle" font-size="12" fill="#92400e">Confluent Kafka 7.5.0  ·  :9092</text>

  <!-- Topic box -->
  <rect x="425" y="185" width="250" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="550" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Topic: order-events</text>
  <!-- Partitions -->
  <rect x="435" y="210" width="68" height="28" rx="5" fill="#fbbf24" />
  <rect x="511" y="210" width="68" height="28" rx="5" fill="#fbbf24" />
  <rect x="587" y="210" width="68" height="28" rx="5" fill="#fbbf24" />
  <text x="469" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Partition 0</text>
  <text x="545" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Partition 1</text>
  <text x="621" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Partition 2</text>
  <text x="550" y="264" text-anchor="middle" font-size="10" fill="#78350f">Replication: 1  ·  Retention: 7 days</text>

  <!-- ─── ZOOKEEPER ─── -->
  <rect x="420" y="330" width="260" height="70" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="1.5" filter="url(#shadow)" />
  <rect x="420" y="330" width="260" height="26" rx="10" fill="#b45309" />
  <rect x="420" y="344" width="260" height="12" fill="#b45309" />
  <text x="550" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Zookeeper</text>
  <text x="550" y="370" text-anchor="middle" font-size="11" fill="#78350f">Confluent 7.5.0  ·  :2181</text>
  <text x="550" y="386" text-anchor="middle" font-size="10" fill="#92400e">Kafka cluster coordination</text>

  <!-- ─── KAFKA ADMIN ─── -->
  <rect x="420" y="425" width="260" height="80" rx="10" fill="#ffffff" stroke="#92400e" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)" />
  <text x="550" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">kafka-admin (CLI)</text>
  <text x="550" y="466" text-anchor="middle" font-size="11" fill="#78350f">npm run admin</text>
  <text x="550" y="482" text-anchor="middle" font-size="10" fill="#64748b">Creates / manages topics</text>
  <text x="550" y="497" text-anchor="middle" font-size="10" fill="#64748b">libs/kafka-admin</text>

  <!-- ─── CONSUMER API ─── -->
  <rect x="795" y="265" width="250" height="120" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)" />
  <rect x="795" y="265" width="250" height="28" rx="10" fill="#16a34a" />
  <rect x="795" y="280" width="250" height="13" fill="#16a34a" />
  <text x="920" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Consumer API</text>
  <text x="920" y="310" text-anchor="middle" font-size="12" fill="#15803d">Express.js  ·  :3002</text>
  <text x="920" y="328" text-anchor="middle" font-size="11" fill="#64748b">GET /api/events  (SSE stream)</text>
  <text x="920" y="344" text-anchor="middle" font-size="11" fill="#64748b">KafkaEventListener</text>
  <text x="920" y="360" text-anchor="middle" font-size="11" fill="#64748b">Group: notification-group</text>
  <text x="920" y="378" text-anchor="middle" font-size="11" fill="#64748b">SseManager · HandleOrderEvent</text>

  <!-- ─── CONSUMER UI ─── -->
  <rect x="795" y="125" width="250" height="90" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)" />
  <rect x="795" y="125" width="250" height="28" rx="10" fill="#22c55e" />
  <rect x="795" y="140" width="250" height="13" fill="#22c55e" />
  <text x="920" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Consumer UI</text>
  <text x="180" y="800" text-anchor="middle" font-size="12" fill="#15803d">Angular 19  ·  :4201</text>
  <text x="920" y="170" text-anchor="middle" font-size="12" fill="#15803d">Angular 19  ·  :4201</text>
  <text x="920" y="188" text-anchor="middle" font-size="11" fill="#64748b">Real-time notification feed</text>
  <text x="920" y="204" text-anchor="middle" font-size="11" fill="#64748b">Angular Signals · Zoneless</text>

  <!-- ─── SHARED LIBS ─── -->
  <!-- kafka-types -->
  <rect x="55" y="620" width="280" height="65" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" />
  <text x="195" y="643" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">@kafka-notify/kafka-types</text>
  <text x="195" y="661" text-anchor="middle" font-size="11" fill="#64748b">OrderPlacedEvent · OrderCancelledEvent</text>
  <text x="195" y="676" text-anchor="middle" font-size="10" fill="#9ca3af">libs/kafka-types</text>

  <!-- kafka-client -->
  <rect x="395" y="620" width="310" height="65" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" />
  <text x="550" y="643" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">@kafka-notify/kafka-client</text>
  <text x="550" y="661" text-anchor="middle" font-size="11" fill="#64748b">KafkaEventPublisher · KafkaEventListener</text>
  <text x="550" y="676" text-anchor="middle" font-size="10" fill="#9ca3af">libs/kafka-client  ·  KafkaJS 2.2.4</text>

  <!-- kafka-admin lib -->
  <rect x="765" y="620" width="295" height="65" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" />
  <text x="912" y="643" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">@kafka-notify/kafka-admin</text>
  <text x="912" y="661" text-anchor="middle" font-size="11" fill="#64748b">Topic provisioning CLI</text>
  <text x="912" y="676" text-anchor="middle" font-size="10" fill="#9ca3af">libs/kafka-admin</text>

  <!-- ─── ARROWS ─── -->

  <!-- 1. Producer UI → Producer API (HTTP REST) -->
  <line x1="180" y1="215" x2="180" y2="258" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead-blue)" />
  <rect x="110" y="228" width="142" height="18" rx="4" fill="#eff6ff" />
  <text x="181" y="241" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">HTTP REST (POST)</text>

  <!-- 2. Producer API → Kafka Broker (publish) -->
  <line x1="305" y1="320" x2="398" y2="235" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowhead-orange)" />
  <rect x="296" y="255" width="120" height="18" rx="4" fill="#fefce8" />
  <text x="356" y="268" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600">publish event</text>

  <!-- 3. Kafka Broker → Consumer API (consume) -->
  <line x1="695" y1="235" x2="788" y2="320" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowhead-green)" />
  <rect x="686" y="255" width="125" height="18" rx="4" fill="#f0fdf4" />
  <text x="749" y="268" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">consume event</text>

  <!-- 4. Consumer API → Consumer UI (SSE) -->
  <line x1="920" y1="265" x2="920" y2="222" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)" />
  <rect x="843" y="236" width="154" height="18" rx="4" fill="#f0fdf4" />
  <text x="920" y="249" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">Server-Sent Events (SSE)</text>

  <!-- 5. Zookeeper → Kafka (coordination, dashed) -->
  <line x1="550" y1="330" x2="550" y2="302" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)" />
  <text x="560" y="320" font-size="9" fill="#b45309">coordinates</text>

  <!-- 6. kafka-admin → Kafka topic (dashed) -->
  <line x1="550" y1="425" x2="550" y2="282" stroke="#92400e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)" />

  <!-- 7. Shared libs → backends (dotted upward) -->
  <line x1="195" y1="620" x2="180" y2="390" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead-gray)" />
  <line x1="550" y1="620" x2="420" y2="302" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead-gray)" />
  <line x1="550" y1="620" x2="795" y2="390" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead-gray)" />

  <!-- ─── LEGEND ─── -->
  <rect x="55" y="530" width="690" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
  <text x="75" y="549" font-size="11" font-weight="700" fill="#475569">Legend:</text>
  <line x1="135" y1="545" x2="170" y2="545" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead-blue)" />
  <text x="175" y="549" font-size="10" fill="#475569">HTTP REST</text>
  <line x1="255" y1="545" x2="290" y2="545" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowhead-orange)" />
  <text x="295" y="549" font-size="10" fill="#475569">Kafka publish</text>
  <line x1="375" y1="545" x2="410" y2="545" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowhead-green)" />
  <text x="415" y="549" font-size="10" fill="#475569">Kafka consume / SSE</text>
  <line x1="530" y1="545" x2="565" y2="545" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead-gray)" />
  <text x="570" y="549" font-size="10" fill="#475569">lib dependency</text>
  <line x1="655" y1="545" x2="690" y2="545" stroke="#92400e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)" />
  <text x="695" y="549" font-size="10" fill="#475569">admin / coordinates</text>

  <!-- Event types legend line 2 -->
  <text x="75" y="571" font-size="10" fill="#475569" font-weight="600">Events:</text>
  <rect x="120" y="560" width="90" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="165" y="572" text-anchor="middle" font-size="9" fill="#92400e" font-weight="600">ORDER_PLACED</text>
  <rect x="225" y="560" width="110" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="280" y="572" text-anchor="middle" font-size="9" fill="#92400e" font-weight="600">ORDER_CANCELLED</text>
  <text x="347" y="571" font-size="10" fill="#64748b">— both serialized as JSON on topic</text>
  <text x="560" y="571" font-size="10" fill="#64748b" font-weight="600">order-events</text>
  <text x="617" y="571" font-size="10" fill="#64748b">(3 partitions)</text>
</svg>

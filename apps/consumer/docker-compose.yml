version: "3.8"

networks:
  kafka-net:
    external: true

services:

  consumer:
    image: node:20-alpine
    container_name: consumer
    working_dir: /app
    volumes:
      - ../../:/app
      - node_modules:/app/node_modules
    networks:
      - kafka-net
    ports:
      - "3002:3002"
    environment:
      KAFKA_BROKER: kafka:29092
      CONSUMER_PORT: 3002
    command: sh -c "npm install && npx tsx watch apps/consumer/src/main.ts"

  consumer-ui:
    image: node:20-alpine
    container_name: consumer-ui
    working_dir: /app
    volumes:
      - ../../:/app
      - node_modules:/app/node_modules
    networks:
      - kafka-net
    ports:
      - "4201:4201"
    environment:
      API_TARGET: http://consumer:3002
    command: sh -c "npx vite apps/consumer-ui --host"
    depends_on:
      - consumer

volumes:
  node_modules:
